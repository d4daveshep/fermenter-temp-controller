name: rust

# CI for the fermenter Rust rewrite (fermenter/), per docs/rewrite-plan.md
# §12.6's CI outline. Established here in slice-7 (deployment-packaging),
# the first slice to touch CI — no prior slice created a workflow file, so
# this covers the whole outline (fmt/clippy/test) in the same file as the
# new docker-build job task 4 asks for, rather than adding the new job with
# nothing pre-existing to sit "alongside".
#
# Hardware e2e tests (tests/serial_hardware.rs, #[ignore]'d) are never run
# here — no ARM64 runner or physical Arduino is available in CI, matching
# rewrite-plan.md §12.6 ("Hardware e2e excluded").

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: fermenter

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fermenter
      # Unit + integration tests, including tests/store_redis.rs
      # (testcontainers pulls redis:8 via the Docker socket already
      # available on GitHub-hosted runners). Hardware tests stay
      # #[ignore]'d and are excluded from this default run.
      - run: cargo test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # Build-only verification that the cross-compiled arm64 release image
      # succeeds (rewrite-plan.md §12.6) — never pushed, never run; no
      # ARM64 hardware or physical Arduino needed.
      - uses: docker/build-push-action@v6
        with:
          context: fermenter
          platforms: linux/arm64
          push: false
          tags: fermenter:ci-check
