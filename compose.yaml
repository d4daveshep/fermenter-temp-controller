# The sole deployment orchestration for this project: 2 containers
# (fermenter + redis:8, Time Series built in). The old Python/InfluxDB
# stack (and its own root-level docker-compose.yaml) was removed at
# cutover (see docs/rewrite-plan.md §15 Phase 3); this is now the only
# compose file in the repository.
#
# Usage:
#   cp fermenter/.env.example fermenter/.env   # then edit SERIAL_PORT etc. for this host
#   docker compose up
services:
  redis:
    image: redis:8
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1

  fermenter:
    # `image:` alongside `build:` means: if the selected image already exists
    # locally (e.g. `docker load`-ed from a `docker buildx build --platform
    # linux/arm64 -t fermenter:v2.0.0` built on the dev machine, per the
    # Dockerfile header), `docker compose up` uses it as-is with no build
    # step. If it's absent, `docker compose build`/`up --build` builds it
    # from `context: fermenter` and tags it fermenter:arm64 (fine on the Pi
    # itself, since it's natively arm64 there — no QEMU needed for a
    # Pi-native build; QEMU is only needed when cross-building from an
    # x86_64 dev machine).
    # Set FERMENTER_IMAGE_TAG when deploying a released image. The arm64
    # default supports local, Pi-native builds outside the release workflow.
    image: fermenter:${FERMENTER_IMAGE_TAG:-arm64}
    build:
      context: fermenter
      args:
        FERMENTER_VERSION: ${FERMENTER_VERSION:-dev}
    env_file: fermenter/.env
    environment:
      - FERMENTER_VERSION=${FERMENTER_IMAGE_TAG:-dev}
    devices:
      - "${SERIAL_PORT:-/dev/ttyACM0}:${SERIAL_PORT:-/dev/ttyACM0}"
    depends_on:
      - redis
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-8080}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
