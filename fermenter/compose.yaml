# Rust stack (slice-7: deployment-packaging) — 2 containers (fermenter +
# redis), replacing the old 3-container Python/InfluxDB stack
# (../docker-compose.yaml) for this new implementation. Lives alongside
# the Dockerfile in fermenter/ (its own env file, `.env`, is separate from
# the repo-root `.env` used by the old Python stack — no collision).
#
# Usage:
#   cp .env.example .env   # then edit SERIAL_PORT etc. for this host
#   docker compose up
#
# Note: if the old Python stack's `controller` service (../docker-compose.yaml,
# privileged, network_mode: host) is running on the same host, it will hold
# the serial device open and block this stack from acquiring it — stop it
# first (see design.md's port-contention risk, first observed in slice-6).
services:
  redis:
    image: redis:8
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1

  fermenter:
    # `image:` alongside `build:` means: if `fermenter:arm64` already exists
    # locally (e.g. `docker load`-ed from a `docker buildx build --platform
    # linux/arm64 -t fermenter:arm64` built on the dev machine, per the
    # Dockerfile header), `docker compose up` uses it as-is with no build
    # step. If it's absent, `docker compose build`/`up --build` builds it
    # from `context: .` and tags it fermenter:arm64 (fine on the Pi itself,
    # since it's natively arm64 there — no QEMU needed for a Pi-native
    # build; QEMU is only needed when cross-building from an x86_64 dev
    # machine).
    image: fermenter:arm64
    build:
      context: .
    env_file: .env
    devices:
      - "${SERIAL_PORT:-/dev/ttyACM0}:${SERIAL_PORT:-/dev/ttyACM0}"
    depends_on:
      - redis
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-8080}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis-data:
